services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8888:8888"
    volumes:
      - ../notebooks:/app/notebooks
      - ../data:/app/data
    environment:
      - PYTHONPATH=/app
    depends_on:
      - pgvector

  pgvector:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: nlpfinance
      POSTGRES_PASSWORD: nlpfinance
      POSTGRES_DB: financial_docs
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
